services:
  - type: web
    name: leads-crm
    runtime: node
    plan: free
    buildCommand: npm run render-build
    startCommand: npm start
    disk:
      name: leads-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /data
      - key: CORS_ORIGIN
        value: "*"
